<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>

        body {
            font-family: Arial;
            background: #111827;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .card {
            background: #1f2937;
            padding: 20px;
            margin: 20px auto;
            width: 300px;
            border-radius: 10px;
        }

        h1 {
            color: #22c55e;
        }

        canvas {
            background: white;
            border-radius: 10px;
            padding: 10px;
        }

    </style>
</head>

<body>

    <h1>🚦 Intelligent Traffic Dashboard</h1>

    <div class="card">
        <h2>Total Cars</h2>
        <h3 id="cars">0</h3>
    </div>

    <div class="card">
        <h2>Total Records</h2>
        <h3 id="records">0</h3>
    </div>

    <div class="card">
        <h2>Traffic Status</h2>
        <h3 id="status">Normal</h3>
    </div>

    <canvas id="trafficChart" width="400" height="200"></canvas>

    <script>

        const carsElement = document.getElementById("cars");
        const recordsElement = document.getElementById("records");
        const statusElement = document.getElementById("status");

        const ctx = document.getElementById('trafficChart');

        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Traffic',
                    data: [],
                    borderWidth: 2
                }]
            }
        });

        async function loadStats() {

            const response = await fetch("http://localhost:8000/stats");

            const data = await response.json();

            carsElement.innerText = data.total_cars;
            recordsElement.innerText = data.records;

            if (data.total_cars > 500) {
                statusElement.innerText = "Heavy Traffic 🔴";
            } else {
                statusElement.innerText = "Normal Traffic 🟢";
            }

            chart.data.labels.push(data.records);
            chart.data.datasets[0].data.push(data.total_cars);

            chart.update();
        }

        setInterval(loadStats, 2000);

    </script>

</body>
</html>
